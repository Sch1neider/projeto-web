<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viralwave</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <header>
      <div class="container-principal">
        <div class="navegador-area">
          <nav>
            <div class="area-logo">
              <h1>Viralwave</h1>
              <img src="./images/viralwave-logo.png" alt="Logo Viralwave" />
              <h2 class="text-white">"Conectar, Criar e Impulsionar"</h2>
            </div>

            <ul class="quadrado-branco">
              <li><a href="./index.html">Início</a></li>
              <li><a href="./portfolio.html">Portfólio</a></li>
              <li><a href="./nossonegocio.html">Nosso Negócio</a></li>
              <li><a href="./contato.html">Contato</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <main>
      <div class="container-branco">
        <div class="form1">
          <h1 id="titulo">Fale Conosco</h1>

          <form action="" class="formulario">
            <div class="campo">
              <label>Nome:</label>
              <input type="text" name="nome" class="form-control" />
            </div>

            <div class="campo">
              <label>Email:</label>
              <input type="email" name="email" class="form-control" />
            </div>

            <div class="campo">
              <label>Assunto:</label>
              <input type="text" name="assunto" class="form-control" />
            </div>

            <div class="campo">
              <label id="mensagem">Mensagem:</label>
              <textarea id="texto"></textarea>
            </div>
    
            <button type="submit" class="btn btn-primary mt-3">Enviar</button>
            
          </form>
        </div>
      </div>
    </main>

    <footer class="footer1 text-center p-3">
      <p>
        Email:
        <a href="mailto:viralwave@email.com" id="email-a"
          >viralwave@email.com</a
        >
      </p>
      <p>Telefone: (27) 99999-9999</p>
      <p>&copy; 2025 Viralwave. Todos os direitos reservados.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
